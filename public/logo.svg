<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 52" width="220" height="52">
  <!-- Icon mark background -->
  <rect x="0" y="0" width="52" height="52" rx="10" fill="#0D1B2A"/>
  <!-- Red dot accent -->
  <circle cx="44" cy="8" r="3" fill="#C0202A"/>
  <!-- Icon: scaled from 24x24 to fit in 52x52 with padding -->
  <g transform="translate(5, 5) scale(1.75)">
    <!-- common rail (horizontal line, red) -->
    <line x1="2" y1="8" x2="22" y2="8" stroke="#C0202A" stroke-width="2" stroke-linecap="square"/>
    <!-- injector head -->
    <rect x="9" y="3" width="6" height="4" rx="0.6" fill="#ffffff"/>
    <!-- injector body shaft -->
    <rect x="10.25" y="9" width="3.5" height="7" fill="#ffffff"/>
    <!-- nozzle taper -->
    <polygon points="10.25,16 13.75,16 12,21" fill="#ffffff"/>
    <!-- connector stub -->
    <rect x="15" y="4" width="2.5" height="2" fill="#ffffff"/>
    <!-- spray dot -->
    <circle cx="12" cy="22.4" r="0.7" fill="#C0202A"/>
  </g>
  <!-- Wordmark -->
  <text x="66" y="30" font-family="Oswald, sans-serif" font-weight="700" font-size="26" letter-spacing="1.5" fill="#0D1B2A" text-anchor="start">JOZUF<tspan fill="#C0202A">.</tspan>DIESEL</text>
  <text x="68" y="44" font-family="Oswald, sans-serif" font-weight="500" font-size="9" letter-spacing="4" fill="#7a8696" text-anchor="start">COMMON RAIL · INJECTOR PARTS</text>
</svg>
